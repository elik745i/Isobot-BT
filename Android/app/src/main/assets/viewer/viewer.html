<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>I-Sobot Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 55%),
        linear-gradient(180deg, #f8f1e4 0%, #ead8bc 100%);
      font-family: sans-serif;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(31, 36, 48, 0.72);
      color: #fffdf8;
      font-size: 12px;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="status">Loading preview...</div>
  </div>

  <script>
    window.ModelViewerElement = {
      dracoDecoderLocation: "https://appassets.androidplatform.net/assets/viewer/draco/"
    };
  </script>
  <script
    type="module"
    src="https://appassets.androidplatform.net/assets/viewer/model-viewer.min.js">
  </script>
  <script type="module">
    const status = document.getElementById("status");

    function showError(message) {
      status.textContent = message;
      status.style.opacity = "1";
    }

    customElements.whenDefined("model-viewer").then(() => {
      const viewer = document.createElement("model-viewer");
      viewer.style.width = "100%";
      viewer.style.height = "100%";
      viewer.style.background = "transparent";
      viewer.setAttribute("src", "https://appassets.androidplatform.net/assets/models/I-Sobot_3d_draco_compressed.glb");
      viewer.setAttribute("alt", "I-Sobot robot 3D preview");
      viewer.setAttribute("camera-controls", "");
      viewer.setAttribute("disable-pan", "");
      viewer.setAttribute("disable-zoom", "");
      viewer.setAttribute("interaction-prompt", "none");
      viewer.setAttribute("shadow-intensity", "0.75");
      viewer.setAttribute("environment-image", "neutral");
      viewer.setAttribute("tone-mapping", "neutral");
      viewer.setAttribute("exposure", "1.05");
      viewer.setAttribute("camera-orbit", "22deg 78deg 130%");
      viewer.setAttribute("min-camera-orbit", "auto 45deg auto");
      viewer.setAttribute("max-camera-orbit", "auto 115deg auto");

      viewer.addEventListener("load", () => {
        status.textContent = "Drag to rotate";
        window.setTimeout(() => {
          status.style.opacity = "0";
        }, 1800);
      });

      viewer.addEventListener("error", () => {
        showError("Preview failed to load");
      });

      document.getElementById("stage").appendChild(viewer);
    }).catch(() => {
      showError("Preview failed to initialize");
    });

    window.addEventListener("error", () => {
      showError("Preview failed to initialize");
    });
  </script>
</body>
</html>
